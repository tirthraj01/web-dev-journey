<!DOCTYPE html>
<html>

<head>
    <title>Todo List</title>
</head>

<body style="background: linear-gradient(to right, rgb(238, 238, 238), rgb(153, 240, 251), rgb(90, 166, 213));">

<div style="text-align: center;">

    <div style="font-size: 20px; padding:20px; 
                color:#000000;
                font-family:Arial;
                border: 3px solid #333;">
        <h1>Todo List 📝</h1>
    </div>

    <div style="padding: 10px;">
        <input id="inp"
            type="text"
            placeholder="Add your Todo task here"
            style="font-size: 22px; background-color:#000; color:white; font-family:Arial;">
        
        <button onclick="addTodo()"
            style="font-size: 22px; background-color:#111; color:#c4c4c4;">
            Add Task
        </button>
        
        <button onclick="deleteLastTodo()">Delete last todo</button>

        <button onclick="deleteFirstTodo()">Delete first todo</button>

        <button onclick="Clear()">Clear everything </button>
    </div>

    <div id="todos" style="margin-top:20px;"></div>

</div>

<script>
let todos = []; 

function addTodo(){
    const inputEL = document.querySelector("#inp");
    const value = inputEL.value;

    todos.push({
        title: value
    });

    inputEL.value = "";
    render();
}

function createTodo(todo){
    const divEL = document.createElement("div");

    const spanEL = document.createElement("span");
    spanEL.innerHTML = todo.title; 

    const buttonEl = document.createElement("button");
    buttonEl.innerHTML = "Delete";

    buttonEl.onclick = function(){
        removeTodo(todo.title); 
    };

    divEL.appendChild(spanEL);
    divEL.appendChild(buttonEl);

    return divEL; 
}

function removeTodo(title){
    for(let i = 0; i < todos.length; i++){
        if(todos[i].title === title){
            todos.splice(i, 1);
            break;
        }
    }
    render();
}

function deleteLastTodo() {
    todos.pop();
    render();
}

function deleteFirstTodo() {
    todos.shift();
    render();
}

function Clear() {
    todos.splice(0, todos.length);
    render();
}

function render() {
    const parent = document.querySelector("#todos");
    parent.innerHTML = "";

    for (let i = 0; i < todos.length; i++) {
        const element = createTodo(todos[i]);
        parent.appendChild(element);
    }
}
</script>

</body>
</html>
